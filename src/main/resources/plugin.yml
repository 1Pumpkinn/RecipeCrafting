name: RecipeCrafting
version: '2.0-SNAPSHOT'
main: rc.maces.Main
api-version: '1.21'
description: Elemental maces with special abilities, element roles, and optimized structure. Features BuddyUp, VinePull, ObsidianCreation, and more!

commands:
  airmace:
    description: Give a player the Air Mace
    usage: /<command> <player>
    permission: airmace.give
  firemace:
    description: Give a player the Fire Mace
    usage: /<command> <player>
    permission: firemace.give
  watermace:
    description: Give a player the Water Mace
    usage: /<command> <player>
    permission: watermace.give
  earthmace:
    description: Give a player the Earth Mace
    usage: /<command> <player>
    permission: earthmace.give
  element:
    description: Manage player elements
    usage: /<command> <check|set|info> [player] [element]
    permission: element.admin
  reroll:
    description: Reroll your element or another player's element
    usage: /<command> [player]
    permission: element.reroll
    aliases: [elementreroll, rollnew]
  myelement:
    description: Show your element information
    usage: /<command>
    permission: element.info
  craftedmaces:
    description: Show your crafted maces count
    usage: /<command>
    permission: element.info

permissions:
  airmace.give:
    description: Allows giving Air Maces
    default: op
  firemace.give:
    description: Allows giving Fire Maces
    default: op
  watermace.give:
    description: Allows giving Water Maces
    default: op
  earthmace.give:
    description: Allows giving Earth Maces
    default: op
  element.admin:
    description: Allows managing player elements
    default: op
  element.reroll:
    description: Allows rerolling your own element
    default: op
  element.reroll.others:
    description: Allows rerolling other players' elements
    default: op
  element.info:
    description: Allows viewing element information
    default: true