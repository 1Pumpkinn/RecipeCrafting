name: RecipeCrafting
version: '2.0-SNAPSHOT'
main: rc.maces.Main
api-version: '1.21'
description: Elemental maces with special abilities, element roles, and optimized structure. Features BuddyUp, VinePull, ObsidianCreation, and more!

commands:
  airmace:
    description: Give an air mace to a player
    usage: /<command> <player>
    permission: airmace.give

  firemace:
    description: Give a fire mace to a player
    usage: /<command> <player>
    permission: firemace.give

  watermace:
    description: Give a water mace to a player
    usage: /<command> <player>
    permission: watermace.give

  earthmace:
    description: Give an earth mace to a player
    usage: /<command> <player>
    permission: earthmace.give

  # Element management commands
  element:
    description: Admin command to manage player elements
    usage: /<command> <check|set|info> [player] [element]
    permission: element.admin

  reroll:
    description: Reroll your element or another player's element
    usage: /<command> [player]
    permission: element.reroll

  myelement:
    description: Check your current element
    usage: /<command>

  craftedmaces:
    description: Check your crafted maces inventory
    usage: /<command>

  # Trust system commands
  trust:
    description: Send a trust request to another player
    usage: /<command> <player>

  untrust:
    description: Remove trust with another player
    usage: /<command> <player>

  trustlist:
    description: List all your trusted allies
    usage: /<command>
    aliases: [allies, trustallies]

  trustaccept:
    description: Accept a pending trust request
    usage: /<command>
    aliases: [accepttrust]

  trustdeny:
    description: Deny a pending trust request
    usage: /<command>
    aliases: [denytrust, rejecttrust]

permissions:
  # Admin permissions
  element.admin:
    description: Allows managing all player elements
    default: op

  element.reroll.others:
    description: Allows rerolling other players' elements
    default: op

  # Mace giving permissions
  airmace.give:
    description: Allows giving air maces
    default: op

  firemace.give:
    description: Allows giving fire maces
    default: op

  watermace.give:
    description: Allows giving water maces
    default: op

  earthmace.give:
    description: Allows giving earth maces
    default: op

  # Player permissions
  element.reroll:
    description: Allows rerolling own element
    default: true

  maces.use:
    description: Allows using mace abilities
    default: true

  maces.craft:
    description: Allows crafting maces
    default: true

  maces.trust:
    description: Allows using trust system
    default: true